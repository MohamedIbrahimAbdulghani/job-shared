version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: my_database
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    volumes:
      - db_data:/var/lib/mysql

  # PHP (Laravel)
  app:
    depends_on:
      - mysql_db
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db
      UPLOAD_LIMIT: 2000M
      MAX_EXECUTION_TIME: 3600


volumes:
  db_data:
